<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Adiyan Live TV</title>

<meta name="theme-color" content="#111111">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<header>

<div class="logo">

📺 Adiyan Live TV

</div>

<div class="search">

<input
type="text"
id="searchInput"
placeholder="Search Channel...">

</div>

</header>

<main>

<section class="player-section">

<video
id="video"
controls
autoplay
playsinline
poster="assets/default.png">

</video>

<div class="player-title"
id="playerTitle">

No Channel Selected

</div>

</section>

<section
id="channelList"
class="channel-list">

<!-- Firebase Channels -->

</section>

</main>

<script
type="module"
src="app.js">

</script>

</body>

</html>
