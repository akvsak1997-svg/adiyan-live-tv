<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Adiyan Live TV</title>

<meta name="theme-color"
content="#0d1117">

<meta name="description"
content="Adiyan Live TV">

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div class="container">

<header class="header">

<div class="logo">

📺 Adiyan Live TV

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search Channel">

</div>

</header>

<main>

<section class="player-area">

<video

id="videoPlayer"

controls

autoplay

playsinline

poster="assets/default.png">

</video>

<div class="player-info">

<h2 id="channelTitle">

Select a Channel

</h2>

<p id="channelDescription">

Welcome to Adiyan Live TV

</p>

</div>

</section>
<section class="player-controls">

<button id="playBtn">
▶ Play
</button>

<button id="stopBtn">
⏹ Stop
</button>

<button id="fullscreenBtn">
⛶ Full Screen
</button>

</section>

<section class="channel-search-result">

<p id="totalChannels">

Total Channels :
<span id="channelCount">0</span>

</p>

</section>

<section
id="channelList"
class="channel-list">

<!-- Channel Card এখান থেকে app.js তৈরি করবে -->

</section>

<div
id="loading"
class="loading">

<div class="loader"></div>

<p>

Loading Channels...

</p>

</div>

<div
id="errorBox"
class="error-box">

<p>

Channel Not Available

</p>

</div>

</main>
