<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adiyan Live TV</title>

<meta name="theme-color" content="#111827">

<meta name="description" content="Adiyan Live TV">

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div class="container">

<header class="header">

<div class="logo">

📺 Adiyan Live TV

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search TV Channel...">

</div>

</header>

<main>

<section class="player-area">

<video
id="videoPlayer"
controls
autoplay
playsinline
poster="assets/default.png">

</video>

<div class="player-info">

<h2 id="channelTitle">

Select a Channel

</h2>

<p id="channelDescription">

Choose a TV channel from the list below.

</p>

</div>

</section>
<!-- =========================
     Player Controls
========================= -->

<section class="player-controls">

<button id="playBtn" class="btn">
▶ Play
</button>

<button id="stopBtn" class="btn">
⏹ Stop
</button>

<button id="fullscreenBtn" class="btn">
⛶ Full Screen
</button>

</section>

<!-- =========================
     Channel Status
========================= -->

<section class="channel-status">

<p>

Total Channels :
<span id="channelCount">0</span>

</p>

</section>

<!-- =========================
     Channel List
========================= -->

<section
id="channelList"
class="channel-list">

<!-- Firebase থেকে Channel Card এখানে তৈরি হবে -->

</section>

<!-- =========================
     Loading Screen
========================= -->

<div
id="loading"
class="loading hidden">

<div class="loader"></div>

<p>

Loading Channels...

</p>

</div>

<!-- =========================
     Error Message
========================= -->

<div
id="errorBox"
class="error-box hidden">

<p>

Channel is currently unavailable.

</p>

</div>

<!-- =========================
     Toast Notification
========================= -->

<div
id="toast"
class="toast hidden">

Ready

</div>

<!-- =========================
     Offline Banner
========================= -->

<div
id="offlineBanner"
class="offline-banner hidden">

No Internet Connection

</div>
<!-- =========================
     Channel Information
========================= -->

<section class="channel-info">

<div class="channel-logo">

<img
id="channelLogo"
src="assets/default.png"
alt="Channel Logo">

</div>

<div class="channel-details">

<h3 id="channelName">

No Channel Selected

</h3>

<p id="channelCategory">

Live TV

</p>

</div>

<button
id="favoriteBtn"
class="btn">

⭐ Favorite

</button>

</section>

<!-- =========================
     Footer
========================= -->

<footer class="footer">

<p>

© 2026 Adiyan Live TV

</p>

<p>

Powered by Firebase & Cloudflare Pages

</p>

<p>

Version 1.0

</p>

</footer>
<!-- =========================
     Firebase Config
========================= -->

<script type="module" src="firebase-config.js"></script>

<!-- =========================
     Main JavaScript
========================= -->

<script type="module" src="app.js"></script>

</main>

</div>

</body>

</html>
